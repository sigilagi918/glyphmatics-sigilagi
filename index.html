<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SigilAGI — GlyphMatics Execution</title>

<style>
body {
    background: #0b0b0b;
    color: #eaeaea;
    font-family: monospace;
    margin: 0;
    padding: 20px;
}
h1 { color: #00ffcc; }

.container {
    max-width: 900px;
    margin: auto;
}

.box {
    background: #111;
    border: 1px solid #222;
    padding: 12px;
    margin-bottom: 15px;
}

input, button, select {
    background: #000;
    color: #00ffcc;
    border: 1px solid #333;
    padding: 8px;
    font-family: monospace;
}

button:hover {
    background: #00ffcc;
    color: #000;
    cursor: pointer;
}

canvas {
    border: 1px solid #333;
    background: #000;
}
</style>
</head>

<body>
<div class="container">

<h1>SigilAGI — GlyphMatics / VIL Execution</h1>

<div class="box">
    <input id="inputBox" placeholder="Enter prompt" style="width:70%">
    <button onclick="runSigil()">Execute</button>
</div>

<div class="box">
    <b>Response</b>
    <div id="response"></div>
</div>

<div class="box">
    <b>Glyph Lattice (Text)</b>
    <div id="lattice"></div>
</div>

<div class="box">
    <b>Glyph Renderer</b><br>
    <canvas id="glyphCanvas" width="512" height="512"></canvas>
</div>

<div class="box">
    <b>Tri-Sigil Output</b>
    <div id="sigil"></div>
</div>

<div class="box">
    <b>Inspect</b>
    <pre id="inspect"></pre>
</div>

<div class="box">
    <b>Model Family Sigils</b><br>
    <select id="modelSelect">
        <option value="sigilagi">sigilagi</option>
        <option value="vil">vil</option>
        <option value="qwen">qwen</option>
        <option value="llama">llama</option>
    </select>
    <button onclick="loadModelSigil()">Load</button>
    <div id="modelSigil"></div>
</div>

</div>

<script>

// === ENDPOINTS ===
const PRIMARY_API = "https://nine1eight-vil-glyphmatic-demo.hf.space/run/predictive";
const FALLBACK_API = "https://nine1eight-vil-glyphmatic-demo.hf.space/api/predict";

// === EXECUTION ===
async function runSigil() {
    const input = document.getElementById("inputBox").value;

    let data;

    try {
        data = await callAPI(PRIMARY_API, input);
    } catch (e) {
        console.warn("Primary failed, switching to fallback...");
        data = await callAPI(FALLBACK_API, input, true);
    }

    document.getElementById("response").innerText = data[0];
    document.getElementById("lattice").innerText = data[1];
    document.getElementById("inspect").innerText = data[2];

    renderGlyphs(data[1]);

    try {
        const inspect = JSON.parse(data[2].replace(/'/g, '"'));
        document.getElementById("sigil").innerText =
            inspect.sigil?.id || inspect.tri_sigil?.id || "none";
    } catch(e) {
        document.getElementById("sigil").innerText = "parse_error";
    }
}

// === API CALL ===
async function callAPI(url, input, alt=false) {

    const payload = alt
        ? {data: [input, "web"]}
        : {user_input: input, session_id: "web"};

    const res = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error("API failed");

    const json = await res.json();

    return alt ? json.data : json;
}

// === GLYPH RENDERER ===
function renderGlyphs(latticeStr) {
    const canvas = document.getElementById("glyphCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,512,512);

    if (!latticeStr) return;

    const tokens = latticeStr.match(/G\d+/g) || [];
    const gridSize = Math.ceil(Math.sqrt(tokens.length));
    const cell = 512 / gridSize;

    tokens.forEach((g, i) => {
        const x = (i % gridSize) * cell;
        const y = Math.floor(i / gridSize) * cell;

        const id = parseInt(g.replace("G",""));

        ctx.fillStyle = id === 15 ? "#222" : "#00ffcc";
        ctx.fillRect(x, y, cell, cell);

        ctx.fillStyle = "#000";
        ctx.font = "10px monospace";
        ctx.fillText(g, x + 2, y + 12);
    });
}

// === MODEL SIGILS ===
function loadModelSigil() {
    const model = document.getElementById("modelSelect").value;

    const sigils = {
        sigilagi: "G0→G15 deterministic lattice",
        vil: "Temporal embedding lattice",
        qwen: "Latent token transformer field",
        llama: "Causal attention chain"
    };

    document.getElementById("modelSigil").innerText =
        sigils[model] || "unknown";
}

</script>

</body>
</html>
