<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SigilAGI — Live Execution</title>

<style>
body {
    background: #0b0b0b;
    color: #eaeaea;
    font-family: monospace;
    padding: 20px;
}

h1 { color: #00ffcc; }

.box {
    background: #111;
    border: 1px solid #222;
    padding: 12px;
    margin-bottom: 12px;
}

input, button {
    background: #000;
    color: #00ffcc;
    border: 1px solid #333;
    padding: 8px;
}

button:hover {
    background: #00ffcc;
    color: #000;
    cursor: pointer;
}

canvas {
    border: 1px solid #333;
}
</style>
</head>

<body>

<h1>SigilAGI — GlyphMatics Execution</h1>

<div class="box">
    <input id="inputBox" value="who are you" style="width:70%">
    <button onclick="runSigil()">Execute</button>
</div>

<div class="box"><b>Status</b><div id="status">idle</div></div>

<div class="box"><b>Response</b><div id="response"></div></div>
<div class="box"><b>Glyph Lattice</b><div id="lattice"></div></div>
<div class="box"><b>Tri-Sigil</b><div id="sigil"></div></div>
<div class="box"><b>Inspect</b><pre id="inspect"></pre></div>

<div class="box">
<b>Renderer</b><br>
<canvas id="glyphCanvas" width="512" height="512"></canvas>
</div>

<script>

// ===== CONFIG =====
const API_URL = "https://nine1eight-vil-glyphmatic-demo.hf.space/api/predict";

// ===== MAIN =====
async function runSigil() {

    const input = document.getElementById("inputBox").value;
    setStatus("sending request...");

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                data: [input, "web"]
            })
        });

        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }

        const json = await res.json();

        console.log("API RAW:", json);

        const data = json.data;

        updateUI(data);

        setStatus("success");

    } catch (err) {
        console.error(err);
        setStatus("ERROR: " + err.message);
        document.getElementById("response").innerText = "API FAILED";
    }
}

// ===== UI UPDATE =====
function updateUI(data) {

    document.getElementById("response").innerText = data[0] || "";
    document.getElementById("lattice").innerText = data[1] || "";
    document.getElementById("inspect").innerText = data[2] || "";

    renderGlyphs(data[1]);

    // parse sigil
    try {
        const inspect = JSON.parse((data[2] || "").replace(/'/g,'"'));
        document.getElementById("sigil").innerText =
            inspect.sigil?.id || inspect.tri_sigil?.id || "none";
    } catch(e) {
        document.getElementById("sigil").innerText = "parse_error";
    }
}

// ===== STATUS =====
function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}

// ===== GLYPH RENDER =====
function renderGlyphs(latticeStr) {

    const canvas = document.getElementById("glyphCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,512,512);

    if (!latticeStr) return;

    const tokens = latticeStr.match(/G\d+/g) || [];

    if (tokens.length === 0) {
        ctx.fillStyle = "#f00";
        ctx.fillText("NO TOKENS", 10, 20);
        return;
    }

    const grid = Math.ceil(Math.sqrt(tokens.length));
    const size = 512 / grid;

    tokens.forEach((g, i) => {

        const x = (i % grid) * size;
        const y = Math.floor(i / grid) * size;

        const id = parseInt(g.replace("G",""));

        ctx.fillStyle = (id === 15) ? "#222" : "#00ffcc";
        ctx.fillRect(x, y, size, size);

        ctx.fillStyle = "#000";
        ctx.font = "10px monospace";
        ctx.fillText(g, x+2, y+12);
    });
}

</script>

</body>
</html>
